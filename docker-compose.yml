services:
  php-fpm:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
      - storage:/var/www/html/storage
      - ./docker/nginx.conf:/etc/nginx/http.d/default.conf
    env_file: .env
    networks:
      - tpt-erp

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - storage:/var/www/html/storage
      - ./docker/nginx.conf:/etc/nginx/http.d/default.conf
    depends_on:
      - php-fpm
    networks:
      - tpt-erp

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis:/data
    networks:
      - tpt-erp

volumes:
  storage:
  redis:

networks:
  tpt-erp:
